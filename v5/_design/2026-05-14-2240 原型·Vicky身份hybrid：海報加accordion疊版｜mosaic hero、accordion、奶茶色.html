<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Vicky 的各種展現｜海報＋Accordion 疊版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5EFE6;
      --bg-deep: #EBE0CB;
      --text: #2C2419;
      --text-soft: #6B5D4F;
      --gold: #C9A961;
      --gold-deep: #A8893E;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 60px 20px;
      min-height: 100vh;
    }

    /* === Header === */
    .section-header {
      text-align: center;
      padding: 48px 0;
    }

    .section-header h2 {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: 4px;
      color: var(--text);
      margin-bottom: 20px;
    }

    .gold-line {
      width: 60px;
      height: 2px;
      background: var(--gold);
      margin: 0 auto;
    }

    /* === Mosaic Grid === */
    .mosaic-wrapper {
      max-width: 1200px;
      margin: 0 auto;
    }

    .mosaic {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: 200px 200px 200px;
      gap: 10px;
    }

    .tile {
      position: relative;
      overflow: hidden;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.4s,
                  z-index 0s 0.4s;
    }

    .tile:hover {
      transform: scale(1.06);
      z-index: 10;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.4s,
                  z-index 0s;
    }

    .tile-creator { grid-column: 1 / 6;   grid-row: 1 / 4; }
    .tile-leader  { grid-column: 6 / 10;  grid-row: 1 / 2; }
    .tile-railway { grid-column: 10 / 13; grid-row: 1 / 3; }
    .tile-mother  { grid-column: 6 / 9;   grid-row: 2 / 4; }
    .tile-wife    { grid-column: 9 / 13;  grid-row: 3 / 4; }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tile-leader img {
      object-position: center top;
    }

    .tile-label {
      position: absolute;
      bottom: 16px;
      left: 16px;
      color: white;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 6px;
      padding: 8px 14px;
      background: rgba(0, 0, 0, 0.5);
      border-left: 2px solid var(--gold);
      backdrop-filter: blur(4px);
    }

    /* === Divider === */
    .section-divider {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .divider-line {
      width: 80px;
      height: 1px;
      background: var(--gold);
    }

    /* === Accordion === */
    .accordion-wrapper {
      max-width: 1200px;
      margin: 0 auto;
    }

    .accordion {
      display: flex;
      gap: 8px;
      height: 480px;
    }

    .panel {
      flex: 1.3;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      border-radius: 4px;
      transition: flex 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .panel.active {
      flex: 4.5;
    }

    /* Background image */
    .panel-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 0.6s ease;
    }

    .panel:hover .panel-bg,
    .panel.active .panel-bg {
      transform: scale(1.03);
    }

    /* Gradient overlay */
    .panel-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(0, 0, 0, 0.7) 100%);
    }

    /* Panel content */
    .panel-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 20px 24px;
    }

    /* Collapsed state: vertical title */
    .panel-title-vertical {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 8px;
      color: #fff;
      display: block;
      transition: opacity 0.3s ease;
    }

    .panel.active .panel-title-vertical {
      display: none;
    }

    /* Expanded state content */
    .panel-expanded {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
      pointer-events: none;
    }

    .panel.active .panel-expanded {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .panel-title-horizontal {
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 12px;
      color: #fff;
      display: block;
    }

    /* === Per-panel images === */
    .panel[data-id="creator"] .panel-bg {
      background-image: url('../assets/img/members/vicky-identities/vicky-01-creator.jpg');
    }
    .panel[data-id="leader"] .panel-bg {
      background-image: url('../assets/img/members/vicky-identities/vicky-02-leader.jpg');
      background-position: center top;
    }
    .panel[data-id="railway"] .panel-bg {
      background-image: url('../assets/img/members/vicky-identities/vicky-03-railway.jpg');
    }
    .panel[data-id="mother"] .panel-bg {
      background-image: url('../assets/img/members/vicky-identities/vicky-04-mother.jpg');
    }
    .panel[data-id="wife"] .panel-bg {
      background-image: url('../assets/img/members/vicky-identities/vicky-05-wife.jpg');
    }

    /* === Mobile (≤ 768px) === */
    @media (max-width: 768px) {
      body {
        padding: 40px 16px;
      }

      .section-header {
        padding: 32px 0;
      }

      .section-header h2 {
        font-size: 22px;
        letter-spacing: 2px;
      }

      /* Mosaic mobile */
      .mosaic {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(5, 180px);
        gap: 8px;
      }

      .tile-creator,
      .tile-leader,
      .tile-railway,
      .tile-mother,
      .tile-wife {
        grid-column: auto;
        grid-row: auto;
      }

      .tile-creator {
        grid-column: 1 / 3;
        grid-row: 1 / 2;
      }

      .tile-leader  { grid-column: 1 / 2; grid-row: 2 / 3; }
      .tile-railway { grid-column: 2 / 3; grid-row: 2 / 3; }
      .tile-mother  { grid-column: 1 / 2; grid-row: 3 / 4; }
      .tile-wife    { grid-column: 2 / 3; grid-row: 3 / 4; }

      .tile-label {
        font-size: 15px;
        letter-spacing: 4px;
        padding: 6px 10px;
        bottom: 12px;
        left: 12px;
      }

      /* Accordion mobile */
      .accordion {
        flex-direction: column;
        height: auto;
      }

      .panel {
        height: 70px;
        flex: none;
        transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .panel.active {
        flex: none;
        height: 360px;
      }

      /* Mobile: horizontal title when collapsed */
      .panel-title-vertical {
        writing-mode: horizontal-tb;
        font-size: 16px;
        letter-spacing: 4px;
        position: absolute;
        bottom: 16px;
        left: 20px;
      }

      .panel.active .panel-title-vertical {
        display: none;
      }

      .panel-content {
        padding: 16px 20px 20px;
      }
    }
  </style>
</head>
<body>

  <!-- 標題 -->
  <div class="section-header">
    <h2>Vicky 的各種展現</h2>
    <div class="gold-line"></div>
  </div>

  <!-- 上半部：Mosaic Grid -->
  <div class="mosaic-wrapper">
    <div class="mosaic">

      <div class="tile tile-creator">
        <img src="../assets/img/members/vicky-identities/vicky-01-creator.jpg" alt="創業家">
        <div class="tile-label">創業家</div>
      </div>

      <div class="tile tile-leader">
        <img src="../assets/img/members/vicky-identities/vicky-02-leader.jpg" alt="團長">
        <div class="tile-label">團長</div>
      </div>

      <div class="tile tile-railway">
        <img src="../assets/img/members/vicky-identities/vicky-03-railway.jpg" alt="輕軌">
        <div class="tile-label">輕軌</div>
      </div>

      <div class="tile tile-mother">
        <img src="../assets/img/members/vicky-identities/vicky-04-mother.jpg" alt="媽媽">
        <div class="tile-label">媽媽</div>
      </div>

      <div class="tile tile-wife">
        <img src="../assets/img/members/vicky-identities/vicky-05-wife.jpg" alt="太太">
        <div class="tile-label">太太</div>
      </div>

    </div>
  </div>

  <!-- 分隔線 -->
  <div class="section-divider">
    <div class="divider-line"></div>
  </div>

  <!-- 下半部：Accordion -->
  <div class="accordion-wrapper">
    <div class="accordion">

      <!-- 創業家 -->
      <div class="panel active" data-id="creator">
        <div class="panel-bg"></div>
        <div class="panel-overlay"></div>
        <div class="panel-content">
          <span class="panel-title-vertical">創業家</span>
          <div class="panel-expanded">
            <span class="panel-title-horizontal">創業家</span>
          </div>
        </div>
      </div>

      <!-- 團長 -->
      <div class="panel" data-id="leader">
        <div class="panel-bg"></div>
        <div class="panel-overlay"></div>
        <div class="panel-content">
          <span class="panel-title-vertical">團長</span>
          <div class="panel-expanded">
            <span class="panel-title-horizontal">團長</span>
          </div>
        </div>
      </div>

      <!-- 輕軌 -->
      <div class="panel" data-id="railway">
        <div class="panel-bg"></div>
        <div class="panel-overlay"></div>
        <div class="panel-content">
          <span class="panel-title-vertical">輕軌</span>
          <div class="panel-expanded">
            <span class="panel-title-horizontal">輕軌</span>
          </div>
        </div>
      </div>

      <!-- 媽媽 -->
      <div class="panel" data-id="mother">
        <div class="panel-bg"></div>
        <div class="panel-overlay"></div>
        <div class="panel-content">
          <span class="panel-title-vertical">媽媽</span>
          <div class="panel-expanded">
            <span class="panel-title-horizontal">媽媽</span>
          </div>
        </div>
      </div>

      <!-- 太太 -->
      <div class="panel" data-id="wife">
        <div class="panel-bg"></div>
        <div class="panel-overlay"></div>
        <div class="panel-content">
          <span class="panel-title-vertical">太太</span>
          <div class="panel-expanded">
            <span class="panel-title-horizontal">太太</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const panels = document.querySelectorAll('.panel');
    const isMobile = () => window.innerWidth <= 768;

    panels.forEach(panel => {
      panel.addEventListener('mouseenter', () => {
        if (isMobile()) return;
        panels.forEach(p => p.classList.remove('active'));
        panel.classList.add('active');
      });

      panel.addEventListener('click', () => {
        if (!isMobile()) return;
        panels.forEach(p => p.classList.remove('active'));
        panel.classList.add('active');
      });
    });
  </script>

</body>
</html>
