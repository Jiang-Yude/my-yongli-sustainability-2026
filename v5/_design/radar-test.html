<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>雷達圖測試</title>
<style>
  :root {
    --gold: #C9A961;
    --gold-deep: #A8884A;
    --gold-soft: #E5D4A6;
    --line: #E0D8C7;
    --ink: #2B2A26;
    --ink-3: #5A554C;
    --ink-4: #7A746B;
  }
  body{
    background:#F4EFE6;
    font-family:"Noto Sans TC",sans-serif;
    margin:0;padding:40px;
  }
  .container{max-width:1000px;margin:0 auto}
  h1{font-family:"Noto Serif TC",serif;color:#2B2A26;margin:0 0 32px}
  .test{
    background:#FBF7EE;
    border:1px solid #E0D8C7;
    border-radius:14px;
    padding:36px;
    margin-bottom:24px;
  }
  .test h2{font-family:"Noto Serif TC",serif;font-size:1.1rem;margin:0 0 18px;color:#5A554C}
</style>
</head>
<body>
<div class="container">
  <h1>雷達圖元件測試</h1>

  <div class="test">
    <h2>5 軸 · Vicky 五大服務分布</h2>
    <div class="radar-chart"
         data-axes='["社務服務","職業服務","社區服務","國際服務","青少年服務"]'
         data-subs='["Club","Vocational","Community","International","Youth"]'
         data-values='[3, 5, 5, 1, 4]'
         data-max="5"
         data-levels="5"></div>
  </div>

  <div class="test">
    <h2>6 軸 · 通用測試</h2>
    <div class="radar-chart"
         data-axes='["A","B","C","D","E","F"]'
         data-values='[5,3,4,5,2,4]'
         data-max="5"></div>
  </div>
</div>
<script src="../assets/js/radar-chart.js"></script>
</body>
</html>
