<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Vicky 的各種展現｜拼貼海報版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5EFE6;
      --bg-deep: #EBE0CB;
      --text: #2C2419;
      --text-soft: #6B5D4F;
      --gold: #C9A961;
      --gold-deep: #A8893E;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 60px 20px;
      min-height: 100vh;
    }

    /* === Header === */
    .section-header {
      text-align: center;
      padding: 48px 0;
    }

    .section-header h2 {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: 4px;
      color: var(--text);
      margin-bottom: 20px;
    }

    .gold-line {
      width: 60px;
      height: 2px;
      background: var(--gold);
      margin: 0 auto;
    }

    /* === Mosaic Grid === */
    .mosaic-wrapper {
      max-width: 1200px;
      margin: 0 auto;
    }

    .mosaic {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: 200px 200px 200px;
      gap: 10px;
    }

    .tile {
      position: relative;
      overflow: hidden;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.4s,
                  z-index 0s 0.4s;
    }

    .tile:hover {
      transform: scale(1.06);
      z-index: 10;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.4s,
                  z-index 0s;
    }

    .tile-creator { grid-column: 1 / 6;   grid-row: 1 / 4; }
    .tile-leader  { grid-column: 6 / 10;  grid-row: 1 / 2; }
    .tile-railway { grid-column: 10 / 13; grid-row: 1 / 3; }
    .tile-mother  { grid-column: 6 / 9;   grid-row: 2 / 4; }
    .tile-wife    { grid-column: 9 / 13;  grid-row: 3 / 4; }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 橫式照片（leader）靠上顯示，確保人物在框內 */
    .tile-leader img {
      object-position: center top;
    }

    .tile-label {
      position: absolute;
      bottom: 16px;
      left: 16px;
      color: white;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 6px;
      padding: 8px 14px;
      background: rgba(0, 0, 0, 0.5);
      border-left: 2px solid var(--gold);
      backdrop-filter: blur(4px);
    }

    /* === Mobile (≤ 768px) === */
    @media (max-width: 768px) {
      body {
        padding: 40px 16px;
      }

      .section-header {
        padding: 32px 0;
      }

      .section-header h2 {
        font-size: 22px;
        letter-spacing: 2px;
      }

      .mosaic {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(5, 180px);
        gap: 8px;
      }

      .tile-creator,
      .tile-leader,
      .tile-railway,
      .tile-mother,
      .tile-wife {
        grid-column: auto;
        grid-row: auto;
      }

      /* 創業家手機跨兩欄當 hero */
      .tile-creator {
        grid-column: 1 / 3;
        grid-row: 1 / 2;
      }

      .tile-leader  { grid-column: 1 / 2; grid-row: 2 / 3; }
      .tile-railway { grid-column: 2 / 3; grid-row: 2 / 3; }
      .tile-mother  { grid-column: 1 / 2; grid-row: 3 / 4; }
      .tile-wife    { grid-column: 2 / 3; grid-row: 3 / 4; }

      .tile-label {
        font-size: 15px;
        letter-spacing: 4px;
        padding: 6px 10px;
        bottom: 12px;
        left: 12px;
      }
    }
  </style>
</head>
<body>

  <div class="section-header">
    <h2>Vicky 的各種展現</h2>
    <div class="gold-line"></div>
  </div>

  <div class="mosaic-wrapper">
    <div class="mosaic">

      <div class="tile tile-creator">
        <img src="../assets/img/members/vicky-identities/vicky-01-creator.jpg" alt="創業家">
        <div class="tile-label">創業家</div>
      </div>

      <div class="tile tile-leader">
        <img src="../assets/img/members/vicky-identities/vicky-02-leader.jpg" alt="團長">
        <div class="tile-label">團長</div>
      </div>

      <div class="tile tile-railway">
        <img src="../assets/img/members/vicky-identities/vicky-03-railway.jpg" alt="輕軌">
        <div class="tile-label">輕軌</div>
      </div>

      <div class="tile tile-mother">
        <img src="../assets/img/members/vicky-identities/vicky-04-mother.jpg" alt="媽媽">
        <div class="tile-label">媽媽</div>
      </div>

      <div class="tile tile-wife">
        <img src="../assets/img/members/vicky-identities/vicky-05-wife.jpg" alt="太太">
        <div class="tile-label">太太</div>
      </div>

    </div>
  </div>

</body>
</html>
